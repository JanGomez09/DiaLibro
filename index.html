<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Día Del Libro 2026</title>
  <link rel="stylesheet" href="inicio.css" />
</head>
<body>

  <div class="phone-frame">

    <!-- Header -->
    <div class="header">
      <span class="header-title">Día Del Libro 2026</span>
      <div class="header-icon">
        <!-- Placeholder icon — replace src with a real logo -->
        <svg viewBox="0 0 38 38" xmlns="http://www.w3.org/2000/svg">
          <circle cx="19" cy="19" r="19" fill="#1a1a2e"/>
          <text x="19" y="24" text-anchor="middle" font-size="18" fill="#e94560">★</text>
        </svg>
      </div>
    </div>

    <!-- Banner image -->
    <div class="banner">
      <!--
        Reemplaza el src con tu imagen real, por ejemplo:
        <img src="rapunzel.jpg" alt="Banner Día Del Libro" />
      -->
      <svg viewBox="0 0 360 220" xmlns="http://www.w3.org/2000/svg" width="360" height="220">
        <defs>
          <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0%" stop-color="#d4956a"/>
            <stop offset="100%" stop-color="#8b5e3c"/>
          </linearGradient>
        </defs>
        <rect width="360" height="220" fill="url(#bg)"/>
        <!-- Decorative circles simulating a blurred background -->
        <circle cx="80" cy="60" r="90" fill="#e8a87c" opacity="0.4"/>
        <circle cx="260" cy="160" r="70" fill="#c47a45" opacity="0.35"/>
        <!-- Simple figure silhouette -->
        <ellipse cx="180" cy="90" rx="38" ry="42" fill="#f5cba0" opacity="0.9"/>
        <ellipse cx="180" cy="160" rx="30" ry="50" fill="#d4956a" opacity="0.8"/>
        <!-- Hair streaks -->
        <path d="M160 70 Q140 130 150 200" stroke="#c8a040" stroke-width="6" fill="none" opacity="0.7"/>
        <path d="M200 70 Q220 130 210 200" stroke="#c8a040" stroke-width="6" fill="none" opacity="0.7"/>
        <path d="M170 65 Q155 120 145 195" stroke="#d4b050" stroke-width="4" fill="none" opacity="0.5"/>
        <!-- Flowers in hair -->
        <circle cx="155" cy="65" r="7" fill="#e84393" opacity="0.8"/>
        <circle cx="205" cy="68" r="6" fill="#ff6b9d" opacity="0.8"/>
        <circle cx="175" cy="55" r="5" fill="#ffb3d1" opacity="0.9"/>
        <!-- Text watermark -->
        <text x="180" y="215" text-anchor="middle" font-size="11" fill="rgba(255,255,255,0.5)" font-family="Arial">Imagen ilustrativa — reemplazar con foto real</text>
      </svg>

      <button class="arrow arrow-left">&#8249;</button>
      <button class="arrow arrow-right">&#8250;</button>
    </div>

    <!-- Section title -->
    <div class="section-title">Inicio</div>

    <!-- Menu buttons -->
    <div class="menu">

      <button class="menu-btn btn-clases">
        Clases
        <span class="btn-icon">📋</span>
      </button>

      <button class="menu-btn btn-ventas">
        Ventas
        <span class="btn-icon">🏪</span>
      </button>

      <button class="menu-btn btn-mapa">
        Mapa
        <span class="btn-icon">🗺️</span>
      </button>

      <button class="menu-btn btn-editor">
        Editor
        <span class="btn-icon">👤</span>
      </button>

    </div>

  </div>

</body>
</html>
