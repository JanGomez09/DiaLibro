<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Día del Libro 2026 – Modificar Función</title>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;600&family=Lato:wght@400;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
 
    :root {
      --rojo: #7a1c1c;
      --rojo-hover: #9a2a2a;
      --crema: #f5f0e8;
      --crema-input: #ffffff;
      --texto-dark: #1e1108;
      --texto-label: #3a2a1a;
      --borde-input: #c8b89a;
      --dorado: #c8a05a;
    }
 
    body {
      background-color: var(--crema);
      font-family: 'Lato', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
 
    /* ── HEADER ── */
    header {
      background-color: var(--rojo);
      padding: 12px 20px;
      display: flex;
      align-items: center;
      gap: 14px;
    }
 
    .header-icon {
      width: 42px;
      height: 42px;
      flex-shrink: 0;
    }
 
    .header-title {
      font-family: 'Cinzel', serif;
      font-size: clamp(15px, 4vw, 20px);
      color: #f5e6c8;
      letter-spacing: 0.5px;
    }
 
    /* ── MAIN ── */
    main {
      flex: 1;
      display: flex;
      justify-content: center;
      padding: 32px 16px 48px;
    }
 
    .card {
      background: var(--crema);
      width: 100%;
      max-width: 480px;
    }
 
    .page-title {
      font-family: 'Lato', sans-serif;
      font-size: clamp(18px, 5vw, 24px);
      font-weight: 700;
      color: var(--texto-dark);
      margin-bottom: 24px;
    }
 
    /* ── IMAGE ── */
    .img-wrapper {
      width: 100%;
      border-radius: 12px;
      overflow: hidden;
      margin-bottom: 32px;
      background: #d8cfc0;
      aspect-ratio: 4 / 3;
      display: flex;
      align-items: center;
      justify-content: center;
    }
 
    .img-wrapper img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }
 
    .img-placeholder {
      color: #8a7a6a;
      font-size: 15px;
      text-align: center;
      padding: 20px;
    }
 
    /* ── FORM ── */
    .form-group {
      margin-bottom: 22px;
    }
 
    .form-group label {
      display: block;
      font-size: 14px;
      font-weight: 700;
      color: var(--texto-label);
      margin-bottom: 8px;
    }
 
    .form-group input {
      width: 100%;
      padding: 10px 14px;
      border: 1.5px solid var(--borde-input);
      border-radius: 6px;
      font-size: 15px;
      font-family: 'Lato', sans-serif;
      color: var(--texto-dark);
      background: var(--crema-input);
      outline: none;
      transition: border-color 0.2s;
    }
 
    .form-group input:focus {
      border-color: var(--rojo);
    }
 
    .input-narrow { max-width: 120px; }
    .input-wide   { max-width: 100%; }
 
    /* ── BUTTON ── */
    .btn-modificar {
      display: block;
      width: 60%;
      max-width: 220px;
      margin: 8px auto 0;
      padding: 13px 0;
      background-color: var(--rojo);
      color: #f5e6c8;
      border: none;
      border-radius: 10px;
      font-size: 16px;
      font-weight: 700;
      font-family: 'Lato', sans-serif;
      letter-spacing: 0.5px;
      cursor: pointer;
      transition: background-color 0.2s, transform 0.1s;
    }
 
    .btn-modificar:hover  { background-color: var(--rojo-hover); }
    .btn-modificar:active { transform: scale(0.97); }
 
    /* ── RESPONSIVE ── */
    @media (max-width: 480px) {
      header { padding: 10px 14px; }
      .header-icon { width: 36px; height: 36px; }
      main { padding: 20px 14px 40px; }
      .btn-modificar { width: 75%; }
    }
  </style>
</head>
<body>
 
  <!-- HEADER -->
  <header>

      <rect width="42" height="42" rx="6" fill="#6a1010"/>

window.toggleAndDisplayCls = async function () {
